<!DOCTYPE html>
<html>
<head>
    <title>Restorant Website</title>
    <style>
        body{
            background-color:yellow;
            font-family:arial;
        }
        .header{
            color:red;
            font-size:50px;
        }
        #menu{
            background-color:green;
            padding:10px;
        }
        .item{
            color:white;
            margin:5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to Our Restorant!!!</h1>
    </div>
    
    <div id="menu">
        <h2 style="color:white;">Menu Items</h2>
        <div class="item">Pizza - $10</div>
        <div class="item">Burger - $8</div>
        <div class="item">Pasta - $12</div>
        <div class="item">Salad - $6</div>
    </div>
    
    <br><br>
    
    <button onclick="orderFood()">Order Now!!!</button>
    
    <div id="order"></div>
    
    <script>
        var total = 0;
        var items = [];
        
        function orderFood(){
            var name = prompt("What is your name?");
            var food = prompt("What do you want to order?");
            var quantity = prompt("How many?");
            
            items.push(food);
            
            if(food == "Pizza"){
                total = total + 10 * quantity;
            }
            if(food == "Burger"){
                total = total + 8 * quantity;
            }
            if(food == "Pasta"){
                total = total + 12 * quantity;
            }
            if(food == "Salad"){
                total = total + 6 * quantity;
            }
            
            document.getElementById("order").innerHTML = "<h3>Thank you " + name + "!</h3><p>You ordered: " + food + "</p><p>Quantity: " + quantity + "</p><p>Total: $" + total + "</p>";
            
            alert("Order placed!");
        }
    </script>
</body>
</html>
